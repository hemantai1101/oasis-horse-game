<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Squirrel Oasis</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="score-bar">
      <span id="header-title">🐿️ Squirrel</span>
      <button id="restart-btn" class="ctrl-btn">↺ Restart</button>
    </header>

    <div id="status-bar">
      <span id="status-text"></span>
    </div>

    <div id="game-area">
      <div id="board"></div>
      <div id="overlay"></div>
    </div>

    <div id="legend">
      <span class="legend-item"><span class="legend-dot slide-dot"></span> Slide (to end)</span>
      <span class="legend-item"><span class="legend-dot knight-dot"></span> Knight (L-jump)</span>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
