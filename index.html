<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oasis</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-theme="horse">
  <div id="app">
    <header id="score-bar">
      <div class="player-label player1-side">Player 1</div>
      <button id="theme-btn" class="theme-btn">🐿️ Squirrel mode</button>
      <div class="player-label player2-side">Player 2</div>
    </header>

    <div id="status-bar">
      <span id="status-text"></span>
    </div>

    <div id="game-area">
      <div id="board"></div>
      <div id="overlay" class="hidden"></div>
    </div>

    <div id="legend">
      <span class="legend-item"><span class="legend-dot slide-dot"></span> Slide (to end)</span>
      <span class="legend-item"><span class="legend-dot knight-dot"></span> Knight (L-jump)</span>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
